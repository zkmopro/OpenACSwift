name: Update Mopro iOS Bindings

on:
  schedule:
    - cron: '0 0 * * *'  # daily at midnight UTC
  workflow_dispatch:       # manual trigger

jobs:
  update-bindings:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Run update-bindings.sh
        run: bash Scripts/update-bindings.sh

      - name: Commit updated bindings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            Package.swift \
            Sources/COpenACFFI/include/openac_mobile_appFFI.h \
            Sources/mopro.swift
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update mopro iOS bindings [skip ci]"
            git push
          fi
